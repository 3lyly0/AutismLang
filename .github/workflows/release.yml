name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-assets:
    name: build-linux-x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build binary
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME:-dev}"
          ARCHIVE="autismlang-${TAG}-linux-x64.tar.gz"
          gcc -O2 -o autism autism.c
          ./autism --version
          mkdir -p dist
          cp autism dist/
          cp LICENSE README.md VERSION.json dist/
          tar -czf "dist/${ARCHIVE}" -C dist autism LICENSE README.md VERSION.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist/autismlang-*.tar.gz

  create-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.tar.gz
