name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-assets:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            shell: bash
            compiler: gcc
            out_bin: autism
            platform: linux-x64
            ext: tar.gz
          - name: macos-x64
            os: macos-latest
            shell: bash
            compiler: clang
            out_bin: autism
            platform: macos-x64
            ext: tar.gz
          - name: windows-x64
            os: windows-latest
            shell: msys2
            compiler: gcc
            out_bin: autism.exe
            platform: windows-x64
            ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup MSYS2 (Windows)
        if: matrix.shell == 'msys2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            zip
            mingw-w64-ucrt-x86_64-gcc

      - name: Build binary (Unix)
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME:-dev}"
          ARCHIVE="autismlang-${TAG}-${{ matrix.platform }}.${{ matrix.ext }}"
          ${{ matrix.compiler }} -O2 -o ${{ matrix.out_bin }} autism.c
          ./${{ matrix.out_bin }} --version
          mkdir -p dist
          cp ${{ matrix.out_bin }} dist/
          cp LICENSE README.md VERSION.json dist/
          tar -czf "dist/${ARCHIVE}" -C dist ${{ matrix.out_bin }} LICENSE README.md VERSION.json

      - name: Build binary (Windows/MSYS2)
        if: matrix.shell == 'msys2'
        shell: msys2 {0}
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME:-dev}"
          ARCHIVE="autismlang-${TAG}-${{ matrix.platform }}.${{ matrix.ext }}"
          gcc -O2 -o ${{ matrix.out_bin }} autism.c
          ./${{ matrix.out_bin }} --version
          mkdir -p dist
          cp ${{ matrix.out_bin }} dist/
          cp LICENSE README.md VERSION.json dist/
          cd dist
          zip -9 "${ARCHIVE}" ${{ matrix.out_bin }} LICENSE README.md VERSION.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/autismlang-*.${{ matrix.ext }}

  create-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.0.5
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
