name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: linux-gcc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build compiler
        run: |
          set -eu
          gcc -O2 -o autism autism.c
          ./autism --version

      - name: Run tests
        run: |
          set -eu
          AUTISM=./autism make test
